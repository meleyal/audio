name: Deploy to HuggingFace
on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                project: [patch, drums, slice, voice, stems, midi]
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 2
            - name: Check for changes
              id: changes
              continue-on-error: true
              run: git diff --name-only HEAD~1 HEAD | grep -q "^${{ matrix.project }}/"
            - name: Deploy ${{ matrix.project }} to HuggingFace
              if: steps.changes.outcome == 'success'
              env:
                  HF_TOKEN: ${{ secrets.HF_TOKEN }}
              run: |
                  cd ${{ matrix.project }}
                  git init
                  git config user.email "actions@github.com"
                  git config user.name "GitHub Actions"
                  git add .
                  git commit -m "Deploy from monorepo"
                  git push --force \
                    https://meleyal:$HF_TOKEN@huggingface.co/spaces/meleyal/${{ matrix.project }} \
                    HEAD:main
